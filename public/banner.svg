<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1120"/>
      <stop offset="50%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Grid background -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>
  <!-- Glow -->
  <circle cx="640" cy="320" r="250" fill="#6366F1" opacity="0.08" filter="blur(60px)"/>
  <!-- Dashboard mockup -->
  <g transform="translate(140, 200)">
    <!-- Sidebar -->
    <rect x="0" y="0" width="80" height="280" rx="12" fill="#1E293B" opacity="0.6"/>
    <rect x="15" y="20" width="50" height="8" rx="4" fill="#475569"/>
    <rect x="15" y="40" width="50" height="8" rx="4" fill="#334155"/>
    <rect x="15" y="60" width="35" height="8" rx="4" fill="#334155"/>
    <!-- Main content -->
    <rect x="95" y="0" width="920" height="280" rx="12" fill="#1E293B" opacity="0.3"/>
    <!-- Cards -->
    <rect x="110" y="15" width="200" height="60" rx="10" fill="#1E293B"/>
    <rect x="325" y="15" width="200" height="60" rx="10" fill="#1E293B"/>
    <rect x="540" y="15" width="200" height="60" rx="10" fill="#1E293B"/>
    <rect x="755" y="15" width="245" height="60" rx="10" fill="#1E293B"/>
    <!-- Chart -->
    <rect x="110" y="90" width="600" height="175" rx="10" fill="#1E293B"/>
    <!-- Side widget -->
    <rect x="725" y="90" width="275" height="175" rx="10" fill="#1E293B"/>
    <!-- Lines in chart -->
    <g stroke="#6366F1" stroke-width="3" stroke-linecap="round" opacity="0.4">
      <polyline points="130,240 200,210 280,230 360,190 440,200 520,170 600,180 690,140"/>
    </g>
    <!-- Dots -->
    <circle cx="130" cy="240" r="4" fill="#8B5CF6"/><circle cx="200" cy="210" r="4" fill="#8B5CF6"/>
    <circle cx="280" cy="230" r="4" fill="#8B5CF6"/><circle cx="360" cy="190" r="4" fill="#8B5CF6"/>
    <circle cx="440" cy="200" r="4" fill="#8B5CF6"/><circle cx="520" cy="170" r="4" fill="#8B5CF6"/>
    <circle cx="600" cy="180" r="4" fill="#8B5CF6"/><circle cx="690" cy="140" r="4" fill="#8B5CF6"/>
    <!-- Bars in widget -->
    <rect x="740" y="170" width="20" height="70" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="770" y="150" width="20" height="90" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="800" y="130" width="20" height="110" rx="4" fill="#818CF8" opacity="0.6"/>
    <rect x="830" y="160" width="20" height="80" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="860" y="140" width="20" height="100" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="890" y="120" width="20" height="120" rx="4" fill="#818CF8" opacity="0.6"/>
    <rect x="920" y="150" width="20" height="90" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="950" y="170" width="20" height="70" rx="4" fill="#6366F1" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="640" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#glow)" letter-spacing="-1">Dashdeck</text>
  <!-- Tagline -->
  <text x="640" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8">22+ Dashboards · AI Analytics · Zero Backend</text>
</svg>
